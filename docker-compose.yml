version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: nepal_election_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nepal_election_2082

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nepal_election_backend
    restart: unless-stopped
    ports:
      - "10000:10000"
    environment:
      PORT: 10000
      MONGO_URI: mongodb+srv://db_user:db_user@cluster0.ujmmmgf.mongodb.net/
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nepal_election_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      REACT_APP_API_URL: https://liveelection-1.onrender.com
    depends_on:
      - backend

volumes:
  mongo_data:
